<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cubo Mágico 3D Interativo</title>
    <style>
        /* Estilização Visual */
        body { 
            background: #1a1a1a; 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            color: white;
            font-family: sans-serif;
        }

        .instructions { margin-bottom: 20px; color: #888; }

        .scene {
            width: 250px;
            height: 250px;
            perspective: 1000px;
        }

        .cube {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transform: rotateX(-30deg) rotateY(-45deg);
            transition: transform 0.1s ease-out;
            cursor: move;
        }

        .face {
            position: absolute;
            width: 250px;
            height: 250px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 2px;
            padding: 2px;
            background: #000; /* Cor da "borda" entre os adesivos */
            border: 2px solid #000;
            box-sizing: border-box;
            backface-visibility: visible;
        }

        /* Cada "sticker" do cubo */
        .face div {
            border-radius: 4px;
        }

        /* Posicionamento e Cores das Faces */
